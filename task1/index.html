<!DOCTYPE html>
<html lang="ru" class="scroll-smooth">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Практика HTTP-запросов</title>
    <!-- Подключаем Tailwind CSS для стилизации -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Настраиваем тему и цвета Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6', 
                    }
                }
            }
        };
    </script>
</head>

<!-- Основной контейнер с поддержкой светлой/темной темы -->
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">
    <div class="container mx-auto px-4 py-10 max-w-4xl">
        <!-- Шапка страницы -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold mb-2">Практика HTTP-запросов</h1>
            <p class="text-lg text-gray-600 dark:text-gray-400">
                Студент: Гусарова Надежда
            </p>
        </header>
        <div class="flex flex-wrap gap-4 justify-center mb-10">
            <button onclick="getAllPosts()"
                class="px-6 py-3 bg-blue-600 text-white font-medium rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-300 transition">
                1. Загрузить 10 постов
            </button>

            <button onclick="getPost5()"
                class="px-6 py-3 bg-gray-600 text-white font-medium rounded-lg shadow-md hover:bg-gray-700 focus:outline-none focus:ring-4 focus:ring-gray-300 transition">
                2. Получить пост №5
            </button>
        </div>
        <!-- Форма для создания нового поста -->
        <section class="mb-12">
            <h2 class="text-2xl font-semibold mb-4">Создать новый пост</h2>
            <div class="space-y-4 max-w-xl mx-auto">
                <!-- Поле для заголовка -->
                <input id="title" type="text" placeholder="Введите заголовок"
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary" />                
                <!-- Поле для текста поста -->
                <textarea id="body" rows="4" placeholder="Введите текст поста..."
                    class="w-full px-4 py-3 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-800 focus:outline-none focus:ring-2 focus:ring-primary"></textarea>                
                <!-- Кнопка отправки POST-запроса -->
                <button onclick="createPost()"
                    class="w-full px-6 py-3 bg-green-600 text-white font-medium rounded-lg shadow-md hover:bg-green-700 focus:outline-none focus:ring-4 focus:ring-green-300 transition text-lg">
                    Отправить POST запрос
                </button>
            </div>
        </section>
        <!-- Блок для отображения результатов -->
        <section>
            <h2 class="text-2xl font-semibold mb-4">Результат</h2>
            <div id="result"
                class="bg-white dark:bg-gray-800 rounded-xl shadow-lg p-6 min-h-[200px] prose dark:prose-invert max-w-none border border-gray-200 dark:border-gray-700">
                <!-- Сюда будут выводиться данные с сервера -->
                Здесь появится ответ от сервера...
            </div>
        </section>
        <!-- Подключаем файл с JavaScript функциями -->
        <script src="script.js"></script>
    </div>
</body>

</html>
